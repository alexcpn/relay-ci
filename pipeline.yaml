name: new-ci-system

defaults:
  image: golang:1.24
  env:
    CI: "true"
    CGO_ENABLED: "0"
    GOPATH: /go
  cpu: 1000
  memory_mb: 512
  timeout: 300

triggers:
  branches: [main]
  pull_requests: true
  paths:
    - "**/*.go"
    - "**/*.proto"
    - "go.mod"
    - "go.sum"
    - "Makefile"

tasks:
  - id: clone
    image: alpine/git:latest
    commands:
      - git clone --depth=1 $REPO_URL /workspace
      - cd /workspace && git checkout $COMMIT_SHA

  - id: proto
    commands:
      - apt-get update -qq && apt-get install -y -qq protobuf-compiler
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - make proto
    depends_on: [clone]
    cache:
      - key: go-mod-{{ checksum "go.sum" }}
        path: /go/pkg/mod

  - id: build
    commands:
      - go build -o bin/ci-master ./cmd/master
      - go build -o bin/ci-worker ./cmd/worker
      - go build -o bin/ci-cli ./cmd/cli
      - go build -o bin/ci-mcp ./cmd/mcp
    depends_on: [proto]
    cache:
      - key: go-mod-{{ checksum "go.sum" }}
        path: /go/pkg/mod
        readonly: true

  - id: test
    commands:
      - go test -race -count=1 ./...
    depends_on: [proto]
    env:
      CGO_ENABLED: "1"
    cache:
      - key: go-mod-{{ checksum "go.sum" }}
        path: /go/pkg/mod
        readonly: true
    cpu: 2000
    memory_mb: 1024

integrations:

  linters:
    enabled: true
    tools:
      - name: golangci-lint
        image: golangci/golangci-lint:latest

  security:
    enabled: true
    tools:
      - name: gosec
      - name: trivy
        severity: HIGH,CRITICAL
        fail_on_findings: true
