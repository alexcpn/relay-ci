syntax = "proto3";

package ci.v1;

option go_package = "github.com/ci-system/proto/ci/v1;civ1";

import "ci/v1/common.proto";

// SecretsService provides secrets to workers at task execution time.
// Runs on the master, backed by Vault or SOPS.
// Secrets are scoped per-pipeline and never written to disk or logs.
service SecretsService {
  // Worker requests secrets for a task. Master validates the worker
  // is assigned this task before returning secrets.
  rpc GetSecrets(GetSecretsRequest) returns (GetSecretsResponse);

  // Admin: create or update a secret for a pipeline.
  rpc PutSecret(PutSecretRequest) returns (PutSecretResponse);

  // Admin: delete a secret.
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);

  // Admin: list secret names (not values) for a pipeline.
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);
}

message GetSecretsRequest {
  WorkerID worker_id = 1;
  TaskID task_id = 2;
  BuildID build_id = 3;
  repeated string secret_names = 4;  // which secrets to fetch
}

message GetSecretsResponse {
  map<string, string> secrets = 1;  // name → value (plaintext, in-memory only)
}

message PutSecretRequest {
  string scope = 1;        // pipeline or repo scope, e.g. "org/repo" or "pipeline:deploy"
  string name = 2;
  string value = 3;         // encrypted in transit (mTLS), encrypted at rest (Vault)
}

message PutSecretResponse {}

message DeleteSecretRequest {
  string scope = 1;
  string name = 2;
}

message DeleteSecretResponse {}

message ListSecretsRequest {
  string scope = 1;
}

message ListSecretsResponse {
  repeated SecretMetadata secrets = 1;
}

message SecretMetadata {
  string name = 1;
  string scope = 2;
  string created_by = 3;
  string updated_at = 4;
}
